---
- name: Check if Kubernetes is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_initialized

- name: Initialize Kubernetes control plane
  command: >
    kubeadm init
    --apiserver-advertise-address={{ ansible_facts.default_ipv4.address }}
    --pod-network-cidr={{ pod_network_cidr }}
  when: not kubeadm_initialized.stat.exists

- name: Wait for API server
  wait_for:
    host: "{{ ansible_facts.default_ipv4.address }}"
    port: 6443
    timeout: 120

- name: Create kubeconfig directory
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy admin.conf
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Install Flannel
  command:
    argv:
      - kubectl
      - apply
      - -f
      - "{{ flannel_manifest }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Wait for Flannel rollout
  command:
    argv:
      - kubectl
      - rollout
      - status
      - daemonset/kube-flannel-ds
      - -n
      - kube-flannel
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: flannel
  retries: 30
  delay: 10
  until: flannel.rc == 0

- name: Wait until control plane node is Ready
  command:
    argv:
      - kubectl
      - get
      - nodes
      - --no-headers
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: nodes
  retries: 30
  delay: 5
  until: >
    nodes.stdout_lines |
    select('search', ' Ready ') |
    list |
    length > 0

- name: Install Metrics Server
  command:
    argv:
      - kubectl
      - apply
      - -f
      - "{{ metrics_server_manifest }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Enable insecure kubelet TLS for Metrics Server
  command: >
    kubectl patch deployment metrics-server
    -n kube-system
    --type=json
    -p='[
      {
        "op":"add",
        "path":"/spec/template/spec/containers/0/args/-",
        "value":"--kubelet-insecure-tls"
      }
    ]'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf