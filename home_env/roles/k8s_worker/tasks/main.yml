---
- name: Check if node has already joined
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_joined

- name: Generate join command on control plane
  command: kubeadm token create --print-join-command
  delegate_to: "{{ groups['k8s_master'][0] }}"
  become: true
  register: join_command
  changed_when: false
  when: not kubelet_joined.stat.exists

- name: Join Kubernetes cluster
  command: "{{ join_command.stdout }}"
  when: not kubelet_joined.stat.exists

- name: Label node as worker
  command: >
    kubectl label node {{ inventory_hostname }}
    node-role.kubernetes.io/worker=
    --overwrite
  delegate_to: "{{ groups['k8s_master'][0] }}"
  become: true
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf